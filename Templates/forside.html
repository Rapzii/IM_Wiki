{% extends "base.html" %}
{% block innhold %}
 
<h1>Alle artikler</h1>
 
{% if artikler %}
    {% for a in artikler %}
    <div class="kort">
        <a href="/artikkel/{{ a.id }}">{{ a.tittel }}</a>
    </div>
    {% endfor %}
{% else %}
    <p>Ingen artikler ennå. <a href="/ny">Lag den første!</a></p>
{% endif %}
 
{% endblock %}
