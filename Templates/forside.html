{% extends "base.html" %}
{% block innhold %}

<h1>Alle artikler</h1>

<form method="get" class="sok">
    <input 
        type="text" 
        name="sok" 
        placeholder="Søk etter artikler..."
        value="{{ request.args.get('sok', '') }}"
    >
    <button type="submit">Søk</button>
</form>

{% if artikler %}
    {% for a in artikler %}
    <div class="kort">
        <a href="/artikkel/{{ a.id }}">{{ a.tittel }}</a>
    </div>
    {% endfor %}
{% else %}
    <p>Ingen artikler ennå. <a href="/ny">Lag den første!</a></p>
{% endif %}

{% endblock %}
